<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certifications | Bhargav</title>
    <meta name="description" content="Professional certifications and achievements of Bhargav.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Modern and Cinematic Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@400;700;800&family=Playfair+Display:ital,wght@1,700&family=Space+Mono:ital@0;1&family=Cinzel:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="cert-body" style="overflow: hidden;"> <!-- hide overflow during intro -->

    <!-- Navigation -->
    <nav id="navbar" class="navbar" style="z-index: 1000; position: fixed;">
        <a href="index.html" class="logo">Bhargav.</a>
        <ul class="nav-links">
            <div class="nav-pill"></div>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="certifications.html" class="active">Certifications</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="burger-menu">
            <span></span>
            <span></span>
        </div>
    </nav>

    <main class="cert-main">
        <div class="cert-background"></div>

        <!-- 1. Text Animation Intro -->
        <div class="cert-intro-layer">
            <h1 class="cert-title-morph" id="cert-title-morph">CERTIFICATIONS</h1>
        </div>

        <!-- 2. The 3D Reveal Container -->
        <div class="cert-reveal-layer">

            <div class="hand-and-cert-group">
                <div class="realistic-hand-element">
                    <img src="hand.png" alt="Hand holding certificate"
                        style="width: 100%; height: 100%; object-fit: cover; object-position: top; mix-blend-mode: screen; pointer-events: none; -webkit-backface-visibility: hidden; backface-visibility: hidden;">
                </div>

                <!-- The Certificate -->
                <div class="certificate-document" id="main-certificate">
                    <div class="cert-doc-front">
                        <div class="cert-border">
                            <h2 class="cert-doc-title">Certifications</h2>
                            <div class="cert-seal">
                                <svg width="40" height="40" viewBox="0 0 100 100">
                                    <polygon
                                        points="50,5 61,25 83,25 72,45 83,65 61,65 50,85 39,65 17,65 28,45 17,25 39,25"
                                        fill="#d4af37" />
                                </svg>
                            </div>
                            <div class="cert-lines">
                                <div class="c-line l-1"></div>
                                <div class="c-line l-2"></div>
                                <div class="c-line l-3"></div>
                            </div>
                            <div class="cert-click-hint">Click to Open</div>
                        </div>
                    </div>
                    <div class="cert-doc-back"></div>
                </div>

            </div>
        </div>

        <!-- 3. Expanded Grid Overlay -->
        <div class="cert-expanded-grid" style="display: none; opacity: 0;">
            <button class="cert-close-btn">&times;</button>
            <h2 class="grid-layer-title">My Certifications</h2>

            <div class="cert-cards-container">
                <div class="cert-card" data-img="siemens_cert.png">
                    <div class="card-glow"></div>
                    <div class="cert-card-inner">
                        <div class="cert-thumbnail-wrapper">
                            <img src="siemens_cert.png" alt="Siemens Certificate Thumbnail" class="cert-thumbnail">
                        </div>
                        <h3>Project Manager Job Simulation</h3>
                        <p class="cert-org">Siemens / Forage</p>
                        <span class="cert-date">Issued: Jan 2026</span>
                    </div>
                </div>

                <div class="cert-card" data-img="cpp_cert.png">
                    <div class="card-glow"></div>
                    <div class="cert-card-inner">
                        <div class="cert-thumbnail-wrapper">
                            <img src="cpp_cert.png" alt="Advanced Cpp Certificate Thumbnail" class="cert-thumbnail">
                        </div>
                        <h3>Advanced Cpp Certification</h3>
                        <p class="cert-org">EduPyramids, SINE, IIT Bombay</p>
                        <span class="cert-date">Issued: Apr 2025</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 4. Certificate Image Modal -->
        <div id="cert-image-modal" class="cert-image-modal">
            <button class="cert-image-close">&times;</button>
            <img id="cert-modal-img" src="" alt="Certificate View">
        </div>
    </main>

    <!-- Essential Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="script.js"></script>
</body>

</html>
